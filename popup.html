<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="dashboard-container">
    <div class="hero-panel">
      <div class="header">
        <h2 id="secret-switch" class="header-title">your patterns <span id="snooze-status" class="snooze-status">snoozed</span></h2>
        <p>objective observation. no judgment.</p>
      </div>

      <div class="summary-strip">
        <div class="summary-chip">
          <span class="summary-chip-label">social media today</span>
          <span class="summary-chip-value" id="val-today-time">--</span>
        </div>
        <div class="summary-chip">
          <span class="summary-chip-label">social media this week</span>
          <span class="summary-chip-value" id="val-week-time">--</span>
        </div>
      </div>
    </div>

    <div class="level-selector">
      <label for="aggression-select" class="control-label">friction level</label>
      <select id="aggression-select">
        <option value="soft">soft (15m, short pause)</option>
        <option value="neutral">neutral (10m, standard pause)</option>
        <option value="harsh">harsh (5m, long pause, forced close)</option>
        <option value="aggressive">aggressive (5m, max pause, auto-close)</option>
      </select>
    </div>

    <div class="stats-grid stats-grid-primary">
      <div class="stat-box">
        <span class="stat-value" id="val-total-time">--</span>
        <span class="stat-label">total time on social media</span>
      </div>
      <div class="stat-box">
        <span class="stat-value" id="val-avg-time">--</span>
        <span class="stat-label">avg minutes/visit</span>
      </div>
    </div>

    <div class="behavior-split panel-block">
      <div class="split-item">
        <span class="split-value" id="val-ignored">--</span>
        <span class="split-label">times ignored warning</span>
      </div>
      <div class="split-item">
        <span class="split-value" id="val-peak-time">--</span>
        <span class="split-label" style="text-align: right;">most likely time</span>
      </div>
    </div>

    <div class="site-breakdown panel-block">
      <div class="section-heading-row">
        <h3>site split</h3>
        <span>minutes / visits / ignored / peak</span>
      </div>
      <div id="site-analytics-list" class="site-analytics-list"></div>
    </div>
    
    <button id="reset-btn">reset data</button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
